<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAI SaaS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 50px auto;
}

input, textarea {
  width: 80%;
  padding: 12px;
  margin: 10px;
}

button {
  padding: 12px 20px;
  margin: 5px;
  background: #3b82f6;
  border: none;
  color: white;
  border-radius: 8px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 JobAI SaaS</h1>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <br>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>

  <div class="card">
    <input id="name" placeholder="Name">
    <input id="job" placeholder="Job Title">
    <textarea id="skills" placeholder="Skills"></textarea>

    <button onclick="generate()">Generate AI Resume</button>
    <button onclick="save()">Save Resume (Pro)</button>
    <button onclick="download()">Download PDF (Pro)</button>

    <div id="resume"></div>
  </div>

</div>

</div>

<script>
// Firebase config (باید خودت بعداً پر کنی)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGN UP
function signup() {
  auth.createUserWithEmailAndPassword(
    email.value,
    password.value
  );
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(
    email.value,
    password.value
  ).then(() => {
    authUI(true);
  });
}

// LOGOUT
function logout() {
  auth.signOut();
  authUI(false);
}

auth.onAuthStateChanged(user => {
  if (user) authUI(true);
  else authUI(false);
});

function authUI(loggedIn) {
  document.getElementById("auth").style.display = loggedIn ? "none" : "block";
  document.getElementById("app").style.display = loggedIn ? "block" : "none";
}

// AI Resume
function generate() {
  let name = document.getElementById("name").value;
  let job = document.getElementById("job").value;
  let skills = document.getElementById("skills").value;

  document.getElementById("resume").innerHTML = `
    <h3>${name}</h3>
    <p>${job}</p>
    <p>${skills}</p>
  `;
}

// SAVE (Pro feature placeholder)
function save() {
  alert("Pro feature - connect Firestore next step");
}

// DOWNLOAD (Pro feature placeholder)
function download() {
  alert("Pro feature - connect Stripe + PDF engine next step");
}
</script>

</body>
</html>

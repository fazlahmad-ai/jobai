<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAI SaaS Fixed</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🤖 JobAI AI Resume Builder</h1>

<p>Create a professional resume with AI in seconds.</p>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>
<button onclick="myResumes()">📂 My Resumes</button>
  <div class="card">
    <input id="name" placeholder="Name">
    <input id="job" placeholder="Job Title">
    <textarea id="skills" placeholder="Skills"></textarea>

    <button onclick="generate()">✨ Generate Resume</button>
    <button onclick="download()">📄 Download PDF (PRO)</button>

    <div id="resume"></div><div id="myResumes"></div>
  </div>
</div>

</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCbj3YJiKDLwoCfg1jmljd4ui9NTWgrrYY",
  authDomain: "jobai-c8a18.firebaseapp.com",
  projectId: "jobai-c8a18",
  storageBucket: "jobai-c8a18.firebasestorage.app",
  messagingSenderId: "96307987386",
  appId: "1:96307987386:web:8ed517fd1e7f051e8dd383",
  measurementId: "G-96Y3NH2PYC"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
  let editingId = null;
// SIGNUP
function signup() {
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

// LOGOUT
function logout() {
  auth.signOut();
}

// UI SWITCH
auth.onAuthStateChanged(user => {
  document.getElementById("auth").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});

// AI Resume
function generate() {
  let name = document.getElementById("name").value;
  let job = document.getElementById("job").value;
  let skills = document.getElementById("skills").value;
// Save resume to Firestore
const user = auth.currentUser;

if (user) {
  db.collection("resumes").add({
    userId: user.uid,
    name: name,
    job: job,
    skills: skills,
    createdAt: new Date()
  })
  .then(() => {
    console.log("Resume saved successfully");
  })
  .catch((error) => {
    console.log("Error saving resume:", error);
  });
}
  document.getElementById("resume").innerHTML = `
<div class="resume">
    <h2>${name}</h2>
    <h3>${job}</h3>

    <hr>

    <h4>Professional Summary</h4>
    <p>
      Motivated and dedicated professional with experience in ${job}.
      Passionate about continuous learning and delivering high-quality work.
    </p>

    <h4>Skills</h4>
    <p>${skills}</p>

    <h4>Generated by JobAI</h4>
    <p>🤖 AI Resume Builder</p>
</div>
`;
}// My Resumes
function myResumes() {
  const user = auth.currentUser;

  if (!user) {
    alert("Please login first");
    return;
  }

  db.collection("resumes")
    .where("userId", "==", user.uid)
    .get()
    .then(snapshot => {

      let html = "<h3>📂 My Resumes</h3>";

      snapshot.forEach(doc => {
        let data = doc.data();

        html += `
<div class="resume">
  <h3>${data.name}</h3>
  <p>${data.job}</p>
  <p>${data.skills}</p>

  <button onclick="editResume('${doc.id}','${data.name}','${data.job}','${data.skills}')">
    ✏️ Edit
  </button>
</div>
`;
      });

      document.getElementById("myResumes").innerHTML = html;

    });
}
function editResume(id, name, job, skills) {
  editingId = id;

  document.getElementById("name").value = name;
  document.getElementById("job").value = job;
  document.getElementById("skills").value = skills;

  window.scrollTo(0, 0);
}
// PRO FEATURE LOCK
function download() {
  const element = document.getElementById("resume");

  if (!element.innerHTML.trim()) {
    alert("Please generate your resume first.");
    return;
  }

  html2pdf().from(element).save("JobAI-Resume.pdf");
    }
</script>

</body>
</html>

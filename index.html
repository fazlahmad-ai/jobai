<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAI SaaS Fixed</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🤖 JobAI AI Resume Builder</h1>

<p class="subtitle">Create a professional resume with AI in seconds.</p>
<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>
<button onclick="myResumes()">📂 My Resumes</button>
  <div class="card">
    <input id="name" placeholder="Name">
    <input id="job" placeholder="Job Title">
    <textarea id="skills" placeholder="Skills"></textarea>

    <button onclick="generate()">✨ Generate Resume</button>
    <button onclick="download()">📄 Download PDF (PRO)</button>

    <div id="resume"></div>
    <div id="myResumes"></div>
  </div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>

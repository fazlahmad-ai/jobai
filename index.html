<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobAI AI Resume Builder</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<!-- html2pdf -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body>

<div class="container">

<h1>🤖 JobAI AI Resume Builder</h1>

<p class="subtitle">
Create a professional resume with AI in seconds.
</p>

<!-- Authentication -->

<div id="auth">

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<div class="buttons">

<button onclick="signUp()">
Sign Up
</button>

<button onclick="login()">
Login
</button>

</div>

</div>

<!-- Main App -->

<div id="app" style="display:none;">

<div class="topbar">

<button onclick="logout()">
Logout
</button>

</div>

<h2>Create Resume</h2>

<input
id="name"
type="text"
placeholder="Full Name">

<input
id="jobTitle"
type="text"
placeholder="Job Title">

<textarea
id="summary"
placeholder="Professional Summary">
</textarea>

<input
id="education"
type="text"
placeholder="Education">

<input
id="experience"
type="text"
placeholder="Work Experience">

<input
id="skills"
type="text"
placeholder="Skills">

<input
id="language"
type="text"
placeholder="Languages">

<div class="buttons">

<button onclick="generateAISummary()">
✨ AI Summary
</button>

<button onclick="generateResume()">
Generate Resume
</button>

<button onclick="secureDownloadPDF()">
📄 Download PDF (PRO)
</button>

</div>

<hr>

<h2>Resume Preview</h2>

<div id="resume" class="resume-preview">

</div>
<!-- Resume Score -->

<div id="resumeScore"></div>

<!-- AI Suggestions -->

<div id="suggestions"></div>

<div class="buttons">

<button onclick="calculateResumeScore()">
Resume Score
</button>

<button onclick="getResumeSuggestions()">
AI Suggestions
</button>

</div>

<hr>

<h2>Cover Letter</h2>

<textarea
id="coverLetter"
placeholder="Cover Letter">
</textarea>

<div class="buttons">

<button onclick="generateCoverLetter()">
Generate Cover Letter
</button>

<button onclick="saveCoverLetter()">
Save Cover Letter
</button>

<button onclick="downloadCoverLetterPDF()">
Download Cover Letter PDF
</button>

</div>

<hr>

<h2>📂 My Resumes</h2>

<div id="resumeList"></div>

<hr>

<h2>👤 My Profile</h2>

<input
id="profileName"
type="text"
placeholder="Full Name">

<input
id="profilePhone"
type="text"
placeholder="Phone">

<input
id="profileLocation"
type="text"
placeholder="Location">

<textarea
id="profileBio"
placeholder="Short Bio">
</textarea>

<input
id="profileImage"
type="file"
accept="image/*">

<div class="buttons">

<button onclick="saveUserProfile()">
Save Profile
</button>

<button onclick="uploadProfileImage()">
Upload Photo
</button>

</div>

<img
id="profilePreview"
width="120"
height="120"
style="border-radius:50%;margin-top:15px;">

<hr>

<h2>📊 Dashboard</h2>

<p>
Email:
<span id="dashboardEmail"></span>
</p>

<p>
Plan:
<span id="dashboardPlan"></span>
</p>

<p>
Resumes:
<span id="dashboardResumeCount"></span>
</p>

<div id="userReport"></div>

<hr>

<h2>🔔 Notifications</h2>

<div id="notifications"></div>

<hr>

<h2>💬 Support</h2>

<textarea
id="supportMessage"
placeholder="Write your message">
</textarea>

<button onclick="sendSupportMessage()">
Send Message
</button>

<div id="chatBox"></div>
<hr>

<h2>🌍 Public Resume</h2>

<input
id="publicLink"
type="text"
readonly
placeholder="Public Resume Link">

<div class="buttons">

<button onclick="createPublicResume()">
Create Public Resume
</button>

<button onclick="copyResumeLink()">
Copy Link
</button>

</div>

<hr>

<h2>🔍 SEO Profile</h2>

<input
id="profileLink"
type="text"
readonly
placeholder="Professional Profile Link">

<textarea
id="seoDescription"
placeholder="SEO Description">
</textarea>

<div class="buttons">

<button onclick="createProfessionalProfile()">
Create Profile
</button>

<button onclick="generateSEODescription()">
Generate SEO
</button>

</div>

<hr>

<h2>🎁 Referral</h2>

<input
id="referralCode"
type="text"
readonly
placeholder="Your Referral Code">

<input
id="enterReferral"
type="text"
placeholder="Enter Referral Code">

<div class="buttons">

<button onclick="createReferralCode()">
Generate Code
</button>

<button onclick="applyReferralCode()">
Apply Code
</button>

</div>

<hr>

<h2>⭐ Subscription</h2>

<p id="userPlan">Free Plan</p>

<div class="buttons">

<button onclick="selectPROPlan('monthly')">
Monthly PRO
</button>

<button onclick="selectPROPlan('yearly')">
Yearly PRO
</button>

<button onclick="payWithUSDT()">
Pay with USDT
</button>

<button onclick="payWithPayPal()">
PayPal
</button>

<button onclick="payWithBank()">
Bank Transfer
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAI Resume Builder</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.container {
  max-width: 800px;
  margin: 60px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 42px;
}

.card {
  background: rgba(255,255,255,0.06);
  padding: 25px;
  border-radius: 15px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #2563eb;
}

.resume {
  margin-top: 25px;
  background: white;
  color: black;
  padding: 25px;
  border-radius: 12px;
}

.resume h2 {
  margin: 0;
}

.badge {
  display: inline-block;
  background: #3b82f6;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  margin: 5px 5px 0 0;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🤖 JobAI Resume Builder</h1>

  <div class="card">
    <input id="name" placeholder="Your Name">
    <input id="job" placeholder="Job Title">
    <textarea id="skills" placeholder="Skills (comma separated)"></textarea>
    <button onclick="generate()">Generate Resume</button>

    <div id="resume" class="resume" style="display:none;"></div>
  </div>
</div>

<script>
function generate() {
  let name = document.getElementById("name").value;
  let job = document.getElementById("job").value;
  let skills = document.getElementById("skills").value.split(",");

  let skillsHTML = skills.map(s => `<span class="badge">${s.trim()}</span>`).join("");

  document.getElementById("resume").style.display = "block";
  document.getElementById("resume").innerHTML = `
    <h2>${name}</h2>
    <h4>${job}</h4>
    <hr>
    <p><b>Skills:</b></p>
    ${skillsHTML}
  `;
}
</script>

</body>
</html>

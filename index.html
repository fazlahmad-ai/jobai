<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobAI Professional Resume Builder</title>

<link rel="stylesheet" href="style.css">

<!-- PDF Generator -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>


<body>

<div class="container">

<header class="hero">

<h1>🤖 JobAI</h1>

<p>
AI Professional Resume Builder
</p>

</header>


<section class="card">

<h2>Create Your Resume</h2>


<div class="form-group">

<label>Full Name</label>

<input 
type="text" 
id="name" 
placeholder="Enter your full name">

</div>


<div class="form-group">

<label>Job Title</label>

<input 
type="text" 
id="jobTitle" 
placeholder="Example: Software Developer">

</div>


<div class="form-group">

<label>Professional Summary</label>

<textarea 
id="summary"
placeholder="Write your professional summary">
</textarea>

</div>


<div class="form-group">

<label>Skills</label>

<textarea 
id="skills"
placeholder="HTML, CSS, JavaScript, Communication">
</textarea>

</div>
<!-- Education -->

<div class="form-group">

<label>Education</label>

<textarea 
id="education"
placeholder="Example: Bachelor Degree in Computer Science">
</textarea>

</div>



<!-- Experience -->

<div class="form-group">

<label>Work Experience</label>

<textarea 
id="experience"
placeholder="Describe your work experience">
</textarea>

</div>



<!-- Languages -->

<div class="form-group">

<label>Languages</label>

<textarea 
id="language"
placeholder="Example: English, Persian">
</textarea>

</div>



<button onclick="previewResume()">
✨ Generate Resume
</button>


</section>



<!-- Resume Preview Section -->

<section class="card">

<h2>Resume Preview</h2>


<div id="resume" class="resume-preview">


<h1 id="previewName">
Your Name
</h1>


<h2 id="previewJob">
Job Title
</h2>


<hr>


<h3>Professional Summary</h3>

<p id="previewSummary"></p>



<h3>Skills</h3>

<p id="previewSkills"></p>



<h3>Education</h3>

<p id="previewEducation"></p>



<h3>Experience</h3>

<p id="previewExperience"></p>



<h3>Languages</h3>

<p id="previewLanguage"></p>



<footer>
Created with JobAI
</footer>


</div>


</section>
id="9kq2m"
<!-- Download PDF Section -->

<section class="card">

<button onclick="downloadPDF()">
📄 Download PDF
</button>

</section>



<!-- My Resumes -->

<section class="card">

<h2>
My Resumes
</h2>


<div id="resumeList">

<p>
No saved resumes yet.
</p>

</div>


</section>



<!-- User Account -->

<section class="card">

<button onclick="logout()">
Logout
</button>

</section>



</div>



<!-- JavaScript -->

<script src="script.js"></script>


</body>

</html>

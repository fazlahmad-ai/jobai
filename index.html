<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAI SaaS Fixed</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {font-family: Arial; background:#0f172a; color:white; text-align:center;}
.container {max-width:800px; margin:50px auto;}
input, textarea {width:80%; padding:10px; margin:8px;}
button {padding:10px 15px; margin:5px; background:#3b82f6; color:white; border:none; border-radius:6px;}
.card {background:#1e293b; padding:20px; margin-top:20px; border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<h1>🤖 JobAI SaaS</h1>

<div id="auth">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <button onclick="logout()">Logout</button>

  <div class="card">
    <input id="name" placeholder="Name">
    <input id="job" placeholder="Job Title">
    <textarea id="skills" placeholder="Skills"></textarea>

    <button onclick="generate()">Generate Resume</button>
    <button onclick="download()">Download (Pro)</button>

    <div id="resume"></div>
  </div>
</div>

</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// SIGNUP
function signup() {
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

// LOGIN
function login() {
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("password").value
  );
}

// LOGOUT
function logout() {
  auth.signOut();
}

// UI SWITCH
auth.onAuthStateChanged(user => {
  document.getElementById("auth").style.display = user ? "none" : "block";
  document.getElementById("app").style.display = user ? "block" : "none";
});

// AI Resume
function generate() {
  let name = document.getElementById("name").value;
  let job = document.getElementById("job").value;
  let skills = document.getElementById("skills").value;

  document.getElementById("resume").innerHTML = `
    <h3>${name}</h3>
    <p>${job}</p>
    <p>${skills}</p>
  `;
}

// PRO FEATURE LOCK
function download() {
  alert("🔒 This is PRO feature. Add Stripe next step.");
}
</script>

</body>
</html>
